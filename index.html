<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="background">

        <div id="sideCard">

            <div id="toggle">

                <button id="toggleButton"><img src="./toggle.png"></button>               

            </div>

            <div class="searchBar">
                <input type="text" placeholder="Add New City" id="inputField">
                <button type="submit" id="searchButton"><img src="/search_black.png" width="20vw" height="20vh"> </button>
            </div>
            
            <div class="savedCities">
                
            </div>        
        </div>
        
        <div id="mainPage">
            <div class="Card" id="location">
                <h1 id="cityName">Mumbai</h1>
                <h2 id="temperature">27℃</h2>
                <h2 id="currentCondition">Rain</h2>
                <div id="hnw">
                    <h3 id="high">29%</h3>
                    <h3 id="low">15 km/hr</h3>
                </div>
            </div>
            
            
            <div class="Card" id="dayForecast">  
            
            </div>

            
            <div  id="dashBoardGrid"> 
                
                <div class="Card" id="tenDayForecast">
                    <h1>5 DAY FORECAST</h1>
                    
                    
                </div>
                
                <div class="gridCard" id="humiCard">
                    <h4>HUMIDITY</h4>
                    <h1 id="humidity">86 %</h1>
                </div>

                <div class="gridCard" id="windCard">
                   
                    <h1>WIND 💨</h1>
                    <h1 class="wind">19</h1>
                    <h1>kph</h1>
                    
                </div>

                <div class="gridCard" id="feelsLike">
                    <h4>🌡️ Feels Like</h4>
                    <h1 id="feelsLikeTemp">27</h1>
                </div>
                
                <div class="gridCard" id="pressureCard">
                    <h4>Pressure</h4>
                    <h1 id="pressure">1,001 hPa</h1>
                </div>
                
                <div class="gridCard" id="sunsetCard">
                    <h4>🌅 SUNSET</h4>
                    <h1 id="sunsetTime">7:20 PM</h1>
                </div>                

                <div class="gridCard">
                    <h1>VISIBILITY</h1>
                    <h1 id="visibility">4</h1>
                    <h1 id="vQuality">Moderate</h1>
                </div>
                
            </div> 
        </div>
    </div>






    <script src="index.js"></script>
</body>
</html>
