<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video id="bgVideo" autoplay muted playsinline>
        <source src="./clear_night.mp4" type="video/mp4">
    </video>

    <div id="background">

        <div id="sideCard">

            <div id="toggle">

                <button id="toggleButton"><img src="./toggle.png"></button>               

            </div>

            <div class="searchBar">
                <input type="text" placeholder="Add New City" id="inputField">
                <button type="submit" id="searchButton"><img src="./search_black.png" width="20vw" height="20vh"> </button>
            </div>
            
            <div class="savedCities">
                
            </div>        
        </div>
        
        <div id="mainPage">
            
            <div id="topDiv">
            
                <div class="card" id="imgndtemp">
                    <img id="weatherImg">
                    <h2 id="temperature"> -- </h2>
                </div>
                
                <div  id="location">
                    <h1 id="cityName"> -- </h1>
                    
                    <h2 id="currentCondition"> -- </h2>
                    <div id="hnw">
                        <h3 id="high"> -- </h3>
                        <h3 id="low"> -- </h3>
                    </div>
                </div>

            </div>
            
            
            <div class="Card" id="dayForecast">  
            
            </div>

            
            <div  id="dashBoardGrid"> 
                
                <div class="Card" id="tenDayForecast">
                    <h4>5 DAY FORECAST</h4>
                    
                    
                </div>
                
                <div class="gridCard" id="humiCard">
                    
                    <img src="./humidity.png" class="cardImg">
                    <div class="innerCard">
                    <h4>HUMIDITY</h4>
                    <h1 id="humidity"> -- </h1>
                    </div>

                </div>

                <div class="gridCard" id="windCard">
                   
                    <img src="./wind.png" class="cardImg" id="windImg">
                    <div class="innerCard">
                        <h4>WIND</h4>
                        <h1 class="wind"> -- </h1>
                    </div>
                    
                </div>

                <div class="gridCard" id="feelsLike">
                    
                    <img src="./feels_like.png" class="cardImg">
                    <div class="innerCard">
                    <h4>FEELS LIKE</h4>
                    <h1 id="feelsLikeTemp"> -- </h1>
                    </div>
                </div>
                
                <div class="gridCard" id="pressureCard">

                    <img src="./pressure.png" class="cardImg" id="pressureImg">
                    <div class="innerCard">
                    <h4>PRESSURE</h4>
                    <h1 id="pressure"> -- hPa</h1>
                    </div>
                </div>
                
                <div class="gridCard" id="sunsetCard">
                    <img src="./sunset.png" class="cardImg">
                    <div class="innerCard">
                    <h4>SUNSET</h4>
                    <h1 id="sunsetTime"> -- </h1>
                    </div>
                </div>                

                <div class="gridCard">
                    <img src="./visibility.png" class="cardImg">
                    <div class="innerCard">
                    <h4>VISIBILITY</h4>
                    <h1 id="visibility"> -- </h1>
                    <!-- <h1 id="vQuality"> -- </h1> -->
                    </div>
                </div>
                
            </div> 
        </div>
    </div>






    <script src="index.js"></script>
</body>
</html>
